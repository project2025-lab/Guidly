<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guidly.ai — Instant AI Tutorials For Every Product You Own</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #112240;
    --navy-light: #1a3a6b;
    --gold: #c9a84c;
    --gold-light: #e8c96d;
    --gold-pale: #f5e6b8;
    --white: #ffffff;
    --grey: #8892a4;
    --light-bg: #f8f6f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow-x: hidden;
  }

  /* ── NAVBAR ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 60px;
    background: rgba(10,22,40,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .logo span { color: var(--white); }

  nav ul {
    display: flex;
    gap: 40px;
    list-style: none;
  }

  nav ul a {
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: color 0.3s;
  }

  nav ul a:hover { color: var(--gold); }

  .nav-cta {
    background: var(--gold);
    color: var(--navy) !important;
    padding: 10px 24px;
    border-radius: 6px;
    font-weight: 600 !important;
    transition: background 0.3s !important;
  }

  .nav-cta:hover { background: var(--gold-light) !important; color: var(--navy) !important; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 40px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(26,58,107,0.6) 0%, transparent 60%);
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .hero-content {
    position: relative;
    max-width: 860px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-light);
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 32px;
    animation: fadeUp 0.8s ease forwards;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 6vw, 76px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 24px;
    animation: fadeUp 0.8s 0.2s ease both;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .hero p {
    font-size: 18px;
    color: rgba(255,255,255,0.65);
    line-height: 1.7;
    max-width: 580px;
    margin: 0 auto 48px;
    font-weight: 300;
    animation: fadeUp 0.8s 0.4s ease both;
  }

  .hero-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    animation: fadeUp 0.8s 0.6s ease both;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--navy);
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.3px;
  }

  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(201,168,76,0.3);
  }

  .btn-secondary {
    background: transparent;
    color: var(--white);
    padding: 16px 40px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    gap: 60px;
    justify-content: center;
    margin-top: 72px;
    padding-top: 48px;
    border-top: 1px solid rgba(201,168,76,0.15);
    animation: fadeUp 0.8s 0.8s ease both;
  }

  .stat h3 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--gold);
  }

  .stat p {
    font-size: 13px;
    color: var(--grey);
    margin-top: 4px;
    margin-bottom: 0;
    animation: none;
  }

  /* ── HOW IT WORKS ── */
  .section {
    padding: 100px 60px;
  }

  .section-label {
    display: inline-block;
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .section-sub {
    color: var(--grey);
    font-size: 17px;
    line-height: 1.7;
    max-width: 520px;
    font-weight: 300;
  }

  .how-it-works {
    background: var(--navy-mid);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .how-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 40px;
    margin-top: 40px;
  }

  .step {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    opacity: 0;
    transform: translateX(-20px);
    transition: all 0.6s ease;
  }

  .step.visible {
    opacity: 1;
    transform: translateX(0);
  }

  .step-num {
    width: 52px;
    height: 52px;
    min-width: 52px;
    border-radius: 50%;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
  }

  .step-text h4 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .step-text p {
    color: var(--grey);
    font-size: 15px;
    line-height: 1.6;
    font-weight: 300;
  }

  /* ── DEMO CARD ── */
  .demo-card {
    background: var(--navy);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  }

  .demo-header {
    background: rgba(201,168,76,0.08);
    padding: 16px 24px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }

  .demo-header span {
    margin-left: auto;
    font-size: 12px;
    color: var(--gold);
    font-weight: 500;
  }

  .demo-body { padding: 28px; }

  .demo-search {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .demo-search input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
  }

  .demo-search input::placeholder { color: var(--grey); }

  .demo-search button {
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.3s;
  }

  .demo-search button:hover { background: var(--gold-light); }

  .demo-result { display: none; }
  .demo-result.active { display: block; }

  .demo-result h5 {
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .demo-step {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
    align-items: flex-start;
  }

  .demo-step-num {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 50%;
    background: rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
  }

  .demo-step p { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.5; }

  .typing-indicator {
    display: none;
    gap: 6px;
    align-items: center;
    padding: 12px 0;
  }

  .typing-indicator.active { display: flex; }
  .typing-indicator span { font-size: 13px; color: var(--grey); }

  .dot-pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.4s infinite;
  }

  .dot-pulse:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse:nth-child(3) { animation-delay: 0.4s; }

  /* ── FEATURES ── */
  .features { max-width: 1200px; margin: 0 auto; }

  .features-header { margin-bottom: 60px; }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .feature-card {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 12px;
    padding: 36px 32px;
    transition: all 0.3s;
    opacity: 0;
    transform: translateY(20px);
  }

  .feature-card.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .feature-card:hover {
    border-color: rgba(201,168,76,0.35);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }

  .feature-icon {
    font-size: 32px;
    margin-bottom: 20px;
  }

  .feature-card h4 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .feature-card p {
    color: var(--grey);
    font-size: 14px;
    line-height: 1.7;
    font-weight: 300;
  }

  /* ── PRICING ── */
  .pricing-section {
    background: var(--navy-mid);
    border-top: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .pricing-inner { max-width: 1000px; margin: 0 auto; text-align: center; }

  .pricing-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 60px;
  }

  .pricing-card {
    background: var(--navy);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: left;
    transition: all 0.3s;
    position: relative;
  }

  .pricing-card.featured {
    border-color: var(--gold);
    background: linear-gradient(135deg, var(--navy-mid), var(--navy));
  }

  .popular-badge {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 16px;
    border-radius: 100px;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .plan-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .plan-price {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .plan-price span {
    font-size: 18px;
    color: var(--grey);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
  }

  .plan-desc {
    color: var(--grey);
    font-size: 14px;
    margin-bottom: 32px;
    padding-bottom: 32px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
    font-weight: 300;
  }

  .plan-features { list-style: none; margin-bottom: 36px; }

  .plan-features li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 14px;
  }

  .plan-features li::before {
    content: '✓';
    color: var(--gold);
    font-weight: 700;
    font-size: 13px;
  }

  .btn-plan {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.3s;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-plan-outline {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3) !important;
    color: var(--white);
  }

  .btn-plan-outline:hover {
    border-color: var(--gold) !important;
    color: var(--gold);
  }

  .btn-plan-gold {
    background: var(--gold);
    color: var(--navy);
  }

  .btn-plan-gold:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  /* ── SIGNUP MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 20px;
    padding: 48px;
    width: 100%;
    max-width: 480px;
    position: relative;
    animation: modalIn 0.4s ease;
  }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: none;
    border: none;
    color: var(--grey);
    font-size: 24px;
    cursor: pointer;
    transition: color 0.3s;
  }

  .modal-close:hover { color: var(--white); }

  .modal-logo {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    margin-bottom: 8px;
  }

  .modal p {
    color: var(--grey);
    font-size: 14px;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .form-group { margin-bottom: 20px; }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }

  .form-group input:focus { border-color: var(--gold); }
  .form-group input::placeholder { color: var(--grey); }

  .btn-submit {
    width: 100%;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.3s;
    margin-top: 8px;
  }

  .btn-submit:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .modal-switch {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--grey);
  }

  .modal-switch a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
  }

  /* ── SEARCH PAGE (after login) ── */
  .search-page {
    display: none;
    min-height: 100vh;
    padding: 100px 40px 60px;
    max-width: 860px;
    margin: 0 auto;
  }

  .search-page.active { display: block; }

  .search-page h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    margin-bottom: 8px;
  }

  .search-page > p {
    color: var(--grey);
    margin-bottom: 40px;
    font-weight: 300;
  }

  .main-search {
    display: flex;
    gap: 12px;
    margin-bottom: 48px;
  }

  .main-search input {
    flex: 1;
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    padding: 18px 24px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s;
  }

  .main-search input:focus { border-color: var(--gold); }
  .main-search input::placeholder { color: var(--grey); }

  .main-search button {
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 10px;
    padding: 18px 32px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.3s;
  }

  .main-search button:hover { background: var(--gold-light); }

  .result-area {
    background: var(--navy-mid);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 36px;
    min-height: 200px;
    display: none;
  }

  .result-area.active { display: block; }

  .result-area h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .result-step {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    align-items: flex-start;
  }

  .result-step-num {
    width: 32px; height: 32px; min-width: 32px;
    border-radius: 50%;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
  }

  .result-step-text h5 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .result-step-text p { font-size: 14px; color: var(--grey); line-height: 1.6; font-weight: 300; }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--grey);
  }

  .loading.active { display: block; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  /* ── FOOTER ── */
  footer {
    background: #060e1a;
    border-top: 1px solid rgba(201,168,76,0.1);
    padding: 60px;
  }

  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--gold);
  }

  .footer-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .footer-links a {
    color: var(--grey);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.3s;
  }

  .footer-links a:hover { color: var(--gold); }

  .footer-copy {
    color: var(--grey);
    font-size: 13px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes pulse {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
